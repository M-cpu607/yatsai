<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#080F20" />
    <meta name="description" content="Yatsai — réseau social sportif pour athlètes et recruteurs" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS standalone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yatsai" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Yatsai</title>

    <!-- Fond sombre appliqué IMMÉDIATEMENT (avant le chargement du JS/CSS)
         pour supprimer le flash blanc au démarrage -->
    <style>
      html, body, #root {
        margin: 0;
        background-color: #080F20;
        min-height: 100%;
      }
      html { height: 100%; }
      /* Splash de démarrage (remplacé par React dès qu'il est prêt) */
      #boot-splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background-color: #080F20;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        font-weight: 800; font-size: 40px; letter-spacing: -0.03em;
        color: #FFFFFF;
        z-index: 0;
      }
      #boot-splash .accent { color: #FFB800; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">Yat<span class="accent">sai</span></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
